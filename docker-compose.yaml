services:
  postgres:
    image: postgres:16-alpine
    pull_policy: always
    restart: always
    mem_limit: 512m
    volumes:
      - /home/joachim/docker/expand-decks/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      expand-decks:
        aliases:
          - postgres

  payload:
    build: .
    pull_policy: always
    restart: always
    mem_limit: 1g
    command: ["sh", "-c", "sleep 5 && pnpm payload migrate && pnpm start"]
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - /home/joachim/docker/expand-decks/media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/admin').then(r => process.exit(r.status < 400 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.http.middlewares.hsts-expand-decks.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.hsts-expand-decks.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.hsts-expand-decks.headers.stsPreload=true"
    networks:
      coolify:
        aliases:
          - expand-decks
      expand-decks:
        aliases:
          - payload

  payload-worker:
    build: .
    pull_policy: always
    restart: always
    mem_limit: 2g
    # long-lived scheduler: bare `jobs:run` is one-shot (exits 0, drains once)
    # which under restart:always caused an endless ~60s flap loop. --cron keeps
    # the process alive and runs the default queue every minute.
    command: ["pnpm", "exec", "payload", "jobs:run", "--queue", "default", "--cron", "* * * * *"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - /home/joachim/docker/expand-decks/media:/app/media
    networks:
      expand-decks:
        aliases:
          - payload-worker

networks:
  coolify:
    external: true
  expand-decks:
